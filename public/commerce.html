<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commerce — LocalBoost</title>
<link rel="stylesheet" href="/styles.css">
<style>
  .wrap { max-width:860px; margin:0 auto; padding:32px 24px 70px; }
  .back { font-size:13px; color:var(--muted); display:inline-block; margin-bottom:18px; }

  .hero-card {
    background:#fff; border:1px solid var(--line); border-radius:var(--r-lg);
    padding:30px; margin-bottom:24px; display:flex; gap:22px; align-items:flex-start;
  }
  .hicon { width:60px; height:60px; border-radius:14px; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:28px; flex-shrink:0; }
  .hname { font-size:22px; font-weight:800; letter-spacing:-.5px; margin-bottom:4px; }
  .htype { font-size:12px; color:var(--accent); font-weight:700; margin-bottom:10px; }
  .hmeta { font-size:13px; color:var(--muted); margin-bottom:4px; }
  .hdesc { font-size:14px; color:var(--ink2); line-height:1.6; margin-top:12px; }

  .review-link { display:inline-flex; align-items:center; gap:7px; margin-top:14px; padding:9px 16px; border-radius:30px; border:1.5px solid var(--line); font-size:13px; font-weight:700; color:var(--ink); }
  .review-link:hover { border-color:var(--accent); color:var(--accent); }

  .auth-gate { background:var(--dark); border-radius:var(--r-md); padding:26px; text-align:center; color:#fff; margin-bottom:20px; }
  .auth-gate p { font-size:13px; color:#B9BFCC; margin-bottom:16px; line-height:1.6; }

  .connected-bar { display:flex; align-items:center; gap:10px; background:#D1FAE5; border-radius:var(--r-sm); padding:10px 14px; margin-bottom:20px; font-size:13px; color:#065F46; font-weight:600; }
  .connected-bar img { width:22px; height:22px; border-radius:50%; }
  .logout-link { margin-left:auto; color:var(--muted); font-weight:500; text-decoration:underline; cursor:pointer; font-size:12px; }

  .tabs { display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap; }
  .tab { padding:9px 18px; border-radius:9px; font-size:13px; font-weight:700; border:1.5px solid var(--line); background:#fff; color:var(--ink2); cursor:pointer; }
  .tab.on { background:var(--dark); color:#fff; border-color:var(--dark); }

  .panel { background:#fff; border:1px solid var(--line); border-radius:var(--r-md); padding:24px; display:none; }
  .panel.on { display:block; }

  .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .alert { padding:11px 14px; border-radius:var(--r-sm); font-size:13px; margin-bottom:14px; display:none; }
  .alert.ok  { background:#D1FAE5; color:#065F46; display:block; }
  .alert.err { background:#FEE2E2; color:#991B1B; display:block; }

  .stars-input { display:flex; gap:6px; margin-bottom:14px; }
  .star-btn { font-size:28px; cursor:pointer; opacity:.3; transition:opacity .1s; }
  .star-btn.lit { opacity:1; }

  .review-item { padding:14px 0; border-bottom:1px solid #F1F5F9; }
  .review-item:last-child { border-bottom:none; }
  .ri-head { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
  .ri-avatar { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--purple),var(--blue)); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; color:#fff; flex-shrink:0; }
  .ri-name { font-size:13px; font-weight:600; }
  .ri-date { font-size:11px; color:var(--muted); }
  .ri-stars { color:#F59E0B; font-size:13px; }
  .ri-comment { font-size:13px; color:var(--ink2); line-height:1.55; }
</style>
</head>
<body>

<header class="lb-bar">
  <div class="lb-logo"><div class="lb-logo-icon">⚡</div><div class="lb-logo-text">Local<em>Boost</em></div></div>
  <nav class="lb-nav"><a href="/annuaire.html">← Recherche</a></nav>
</header>

<div class="wrap" id="wrap">
  <a href="/annuaire.html" class="back">← Retour à la recherche</a>
  <div class="empty">Chargement...</div>
</div>

<script>
const ICONS  = { restaurant:'🍽️', coiffeur:'💇', beaute:'💅', boulangerie:'🥖', sport:'🏋️', sante:'🩺', commerce:'🛍️', autre:'📍' };
const LABELS = { restaurant:'Restaurant', coiffeur:'Coiffeur', beaute:'Institut de beauté', boulangerie:'Boulangerie', sport:'Sport / Fitness', sante:'Santé / Bien-être', commerce:'Commerce', autre:'Autre' };

function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }
function slug(){ return new URLSearchParams(location.search).get('slug'); }

let session = null;
let selectedRating = 0;
let merchant = null;

async function init() {
  const sl = slug();
  const wrap = document.getElementById('wrap');
  if (!sl) { wrap.innerHTML = '<a href="/annuaire.html" class="back">← Retour</a><div class="empty">Commerce non spécifié.</div>'; return; }

  const [sRes, mRes, rvRes, glRes] = await Promise.all([
    fetch('/api/auth/client/me'),
    fetch('/api/public/merchants/' + encodeURIComponent(sl)),
    fetch('/api/public/merchants/' + encodeURIComponent(sl) + '/reviews'),
    fetch('/api/public/merchants/' + encodeURIComponent(sl) + '/google-link'),
  ]);

  session = await sRes.json();
  if (!mRes.ok) { wrap.innerHTML = '<a href="/annuaire.html" class="back">← Retour</a><div class="empty">Commerce introuvable.</div>'; return; }
  merchant = (await mRes.json()).merchant;
  const reviews = (await rvRes.json()).reviews || [];
  const { url: googleUrl } = await glRes.json();

  wrap.innerHTML = `
    <a href="/annuaire.html" class="back">← Retour à la recherche</a>

    <div class="hero-card">
      <div class="hicon">${ICONS[merchant.business_type]||'📍'}</div>
      <div>
        <div class="hname">${esc(merchant.business_name)}</div>
        <div class="htype">${LABELS[merchant.business_type]||'Commerce'}${merchant.city?' · '+esc(merchant.city):''}</div>
        <div class="hmeta">📍 ${esc(merchant.address||merchant.city||'Adresse non renseignée')}</div>
        ${merchant.phone?`<div class="hmeta">📞 ${esc(merchant.phone)}</div>`:''}
        ${merchant.offers_delivery?'<div class="hmeta">🚴 <strong>Livraison / À emporter disponible</strong></div>':''}
        ${merchant.description?`<div class="hdesc">${esc(merchant.description)}</div>`:''}
        <a href="${googleUrl}" target="_blank" rel="noopener" class="review-link">⭐ Laisser un avis Google</a>
      </div>
    </div>

    <div id="auth-zone"></div>
    <div id="actions" style="display:none">
      <div class="tabs" id="tabs">
        <button class="tab on" onclick="switchTab('rdv')">📅 ${merchant.offers_delivery?'Réserver / Commander':'Rendez-vous'}</button>
        <button class="tab" onclick="switchTab('msg')">💬 Message</button>
        <button class="tab" onclick="switchTab('avis')">⭐ Laisser un avis LocalBoost</button>
      </div>

      <!-- Panel RDV / Livraison -->
      <div class="panel on" id="panel-rdv">
        <div class="alert" id="rdv-alert"></div>
        ${merchant.offers_delivery ? `
        <div class="lb-field" style="margin-bottom:14px">
          <label class="lb-label">Type de demande</label>
          <div style="display:flex;gap:10px">
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="radio" name="rtype" value="rdv" checked onchange="toggleDelivery(this)"> Rendez-vous</label>
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="radio" name="rtype" value="takeaway" onchange="toggleDelivery(this)"> À emporter</label>
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer"><input type="radio" name="rtype" value="delivery" onchange="toggleDelivery(this)"> Livraison</label>
          </div>
        </div>
        <div class="lb-field" id="delivery-addr-field" style="display:none">
          <label class="lb-label">Adresse de livraison</label>
          <input class="lb-input" id="delivery-addr" placeholder="15 rue Victor Hugo, Paris">
        </div>
        ` : ''}
        <div class="form-row">
          <div class="lb-field"><label class="lb-label">Date</label><input class="lb-input" type="date" id="rdv-date" required></div>
          <div class="lb-field"><label class="lb-label">Heure</label><input class="lb-input" type="time" id="rdv-time" required></div>
        </div>
        <div class="lb-field"><label class="lb-label">Service / Commande (optionnel)</label><input class="lb-input" id="rdv-service" placeholder="${merchant.offers_delivery?'Ex: Pizza margherita x2...':'Ex: Coupe + brushing...'}"></div>
        <div class="lb-field"><label class="lb-label">Note (optionnel)</label><textarea class="lb-textarea" id="rdv-notes" style="min-height:60px"></textarea></div>
        <button class="btn btn-amber btn-block" onclick="submitRdv()">Envoyer la demande</button>
      </div>

      <!-- Panel Message -->
      <div class="panel" id="panel-msg">
        <div class="alert" id="msg-alert"></div>
        <div class="lb-field"><label class="lb-label">Votre message</label><textarea class="lb-textarea" id="msg-text" placeholder="Posez votre question au commerce..."></textarea></div>
        <button class="btn btn-amber btn-block" onclick="submitMsg()">Envoyer</button>
      </div>

      <!-- Panel Avis LocalBoost -->
      <div class="panel" id="panel-avis">
        <div class="alert" id="avis-alert"></div>
        <div class="lb-field">
          <label class="lb-label">Votre note</label>
          <div class="stars-input" id="stars">
            ${[1,2,3,4,5].map(n=>`<span class="star-btn" data-n="${n}" onclick="setRating(${n})">★</span>`).join('')}
          </div>
        </div>
        <div class="lb-field"><label class="lb-label">Votre avis (optionnel)</label><textarea class="lb-textarea" id="avis-text" placeholder="Dites quelques mots sur votre expérience..."></textarea></div>
        <button class="btn btn-amber btn-block" onclick="submitAvis()">Publier l'avis</button>

        ${reviews.length ? `<hr style="margin:24px 0;border:none;border-top:1px solid var(--line)"><div style="font-size:14px;font-weight:700;margin-bottom:14px">Avis des clients</div>
        ${reviews.map(r=>`<div class="review-item"><div class="ri-head"><div class="ri-avatar">${(r.client_name||'?')[0].toUpperCase()}</div><div><div class="ri-name">${esc(r.client_name)}</div><div class="ri-date">${new Date(r.created_at).toLocaleDateString('fr-FR')}</div></div><span class="ri-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</span></div>${r.comment?`<div class="ri-comment">${esc(r.comment)}</div>`:''}</div>`).join('')}` : ''}
      </div>
    </div>
  `;

  renderAuthZone();
}

function renderAuthZone() {
  const zone = document.getElementById('auth-zone');
  const actions = document.getElementById('actions');
  if (session?.connected) {
    zone.innerHTML = `<div class="connected-bar"><img src="${session.picture}" alt=""><span>Connecté en tant que ${esc(session.name)}</span><span class="logout-link" onclick="logout()">Se déconnecter</span></div>`;
    actions.style.display = 'block';
  } else {
    zone.innerHTML = `<div class="auth-gate"><p>Connectez-vous avec Google pour envoyer un message, prendre rendez-vous ou laisser un avis.</p><button class="btn btn-google" onclick="loginGoogle()">${googleIcon()} Continuer avec Google</button></div>`;
    actions.style.display = 'none';
  }
}

function googleIcon() {
  return `<svg width="16" height="16" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.8 2.72v2.26h2.9c1.7-1.57 2.7-3.88 2.7-6.62z"/><path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.84.86-3.06.86-2.36 0-4.36-1.6-5.08-3.74H.92v2.33A9 9 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.92 10.68A5.4 5.4 0 0 1 3.64 9c0-.58.1-1.15.28-1.68V4.99H.92A9 9 0 0 0 0 9c0 1.45.35 2.83.92 4.01l3-2.33z"/><path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A8.59 8.59 0 0 0 9 0 9 9 0 0 0 .92 4.99l3 2.33C4.64 5.18 6.64 3.58 9 3.58z"/></svg>`;
}

async function loginGoogle() {
  document.cookie = `lb_back=/commerce.html?slug=${encodeURIComponent(slug())}; path=/; max-age=600`;
  try {
    const { url, error } = await fetch('/api/auth/client/start').then(r=>r.json());
    if (url) window.location.href = url;
    else alert(error || 'Google non configuré sur ce serveur.');
  } catch(e) { alert('Erreur de connexion au serveur.'); }
}

async function logout() {
  await fetch('/api/auth/client/logout', { method:'POST' });
  session = { connected: false };
  renderAuthZone();
}

function switchTab(t) {
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('on'));
  event.target.classList.add('on');
  document.getElementById('panel-'+t).classList.add('on');
}

function toggleDelivery(radio) {
  const field = document.getElementById('delivery-addr-field');
  if (field) field.style.display = radio.value === 'delivery' ? 'block' : 'none';
}

function setRating(n) {
  selectedRating = n;
  document.querySelectorAll('.star-btn').forEach(s => s.classList.toggle('lit', +s.dataset.n <= n));
}

async function submitRdv() {
  const date = document.getElementById('rdv-date').value;
  const time = document.getElementById('rdv-time').value;
  if (!date || !time) return showAlert('rdv-alert', 'La date et l\'heure sont obligatoires.', true);
  const rtypeEl = document.querySelector('input[name="rtype"]:checked');
  const requestType = rtypeEl ? rtypeEl.value : 'rdv';
  const deliveryAddress = requestType === 'delivery' ? document.getElementById('delivery-addr')?.value : '';
  await send('/api/public/merchants/' + slug() + '/appointment', { date, time, service: document.getElementById('rdv-service').value, requestType, deliveryAddress, notes: document.getElementById('rdv-notes').value }, 'rdv-alert', 'Demande envoyée ! Le commerce vous confirmera prochainement.');
}

async function submitMsg() {
  const message = document.getElementById('msg-text').value.trim();
  if (!message) return showAlert('msg-alert', 'Écrivez votre message.', true);
  await send('/api/public/merchants/' + slug() + '/message', { message }, 'msg-alert', 'Message envoyé au commerce !');
}

async function submitAvis() {
  if (!selectedRating) return showAlert('avis-alert', 'Choisissez une note.', true);
  await send('/api/public/merchants/' + slug() + '/review', { rating: selectedRating, comment: document.getElementById('avis-text').value }, 'avis-alert', 'Avis publié, merci !');
}

async function send(url, body, alertId, okMsg) {
  try {
    const r = await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
    const d = await r.json();
    if (r.ok) showAlert(alertId, '✅ ' + okMsg, false);
    else showAlert(alertId, d.error || 'Une erreur est survenue.', true);
  } catch(e) { showAlert(alertId, 'Erreur de connexion au serveur.', true); }
}

function showAlert(id, msg, isErr) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = msg;
  el.className = 'alert ' + (isErr ? 'err' : 'ok');
}

init();
</script>
</body>
</html>
