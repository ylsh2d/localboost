<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trouver un commerce — LocalBoost</title>
<link rel="stylesheet" href="/styles.css">
<style>
  .hero {
    background:radial-gradient(circle at 20% 0%, var(--dark2), var(--dark) 65%);
    padding:50px 24px 80px; text-align:center;
  }
  .hero h1 { color:#fff; font-size:30px; font-weight:800; letter-spacing:-1px; margin-bottom:26px; }

  .sbox { max-width:680px; margin:0 auto; background:#fff; border-radius:var(--r-md); padding:8px; display:flex; gap:8px; box-shadow:var(--sh-lg); }
  .sbox input { flex:1; border:none; outline:none; padding:12px 16px; font-size:14px; font-family:var(--font); }
  .sbox button { background:var(--accent); color:#fff; border:none; padding:12px 22px; border-radius:9px; font-weight:700; cursor:pointer; font-size:14px; font-family:var(--font); }
  .sbox button:hover { background:#D97706; }

  .filters { max-width:980px; margin:-36px auto 0; padding:0 24px; position:relative; z-index:2; }
  .filters-inner { background:#fff; border:1px solid var(--line); border-radius:var(--r-md); box-shadow:var(--sh); padding:12px; display:flex; gap:8px; overflow-x:auto; }
  .chip { border:1.5px solid var(--line); border-radius:30px; padding:8px 16px; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; color:var(--ink2); background:#fff; transition:all .15s; flex-shrink:0; }
  .chip.on { background:var(--accent); color:#fff; border-color:var(--accent); }

  .results { max-width:980px; margin:0 auto; padding:36px 24px 70px; }
  .count { font-size:13px; color:var(--muted); margin-bottom:18px; }

  .grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; }
  .mcard { background:#fff; border:1px solid var(--line); border-radius:var(--r-md); padding:22px; display:block; color:inherit; transition:all .15s; position:relative; overflow:hidden; }
  .mcard::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--accent),var(--accent2)); opacity:0; transition:opacity .15s; }
  .mcard:hover { border-color:var(--accent); transform:translateY(-2px); box-shadow:var(--sh); }
  .mcard:hover::before { opacity:1; }

  .micon { width:42px; height:42px; border-radius:10px; background:linear-gradient(135deg,var(--accent),var(--accent2)); display:flex; align-items:center; justify-content:center; font-size:19px; margin-bottom:12px; }
  .mname { font-size:16px; font-weight:700; margin-bottom:4px; }
  .mtype { font-size:12px; color:var(--accent); font-weight:700; margin-bottom:8px; }
  .mdesc { font-size:12px; color:var(--muted); line-height:1.55; margin-bottom:8px; }
  .maddr { font-size:11px; color:var(--muted); }
  .mdel  { display:inline-block; margin-top:8px; font-size:11px; font-weight:700; color:var(--green); }

  @media(max-width:800px){ .grid { grid-template-columns:1fr 1fr; } }
  @media(max-width:500px){ .grid { grid-template-columns:1fr; } }
</style>
</head>
<body>

<header class="lb-bar">
  <div class="lb-logo"><div class="lb-logo-icon">⚡</div><div class="lb-logo-text">Local<em>Boost</em></div></div>
  <nav class="lb-nav">
    <a href="/">← Accueil</a>
    <a href="/connexion-commercant.html" class="hide-mob">Espace commerçant</a>
  </nav>
</header>

<div class="hero">
  <h1>Trouvez un commerce près de chez vous</h1>
  <div class="sbox">
    <input id="q" placeholder="Rechercher un commerce, ex : Pizzeria Napoli...">
    <button onclick="load()">Rechercher</button>
  </div>
</div>

<div class="filters">
  <div class="filters-inner" id="chips">
    <div class="chip on" data-type="all">🏪 Tous</div>
    <div class="chip" data-type="restaurant">🍽️ Restaurant</div>
    <div class="chip" data-type="coiffeur">💇 Coiffeur</div>
    <div class="chip" data-type="beaute">💅 Institut de beauté</div>
    <div class="chip" data-type="boulangerie">🥖 Boulangerie</div>
    <div class="chip" data-type="sport">🏋️ Sport / Fitness</div>
    <div class="chip" data-type="sante">🩺 Santé / Bien-être</div>
    <div class="chip" data-type="commerce">🛍️ Commerce</div>
    <div class="chip" data-type="autre">📍 Autre</div>
  </div>
</div>

<div class="results">
  <div class="count" id="count">Chargement...</div>
  <div class="grid" id="grid"></div>
</div>

<footer class="lb-footer">© 2026 LocalBoost</footer>

<script>
const ICONS  = { restaurant:'🍽️', coiffeur:'💇', beaute:'💅', boulangerie:'🥖', sport:'🏋️', sante:'🩺', commerce:'🛍️', autre:'📍' };
const LABELS = { restaurant:'Restaurant', coiffeur:'Coiffeur', beaute:'Institut de beauté', boulangerie:'Boulangerie', sport:'Sport / Fitness', sante:'Santé / Bien-être', commerce:'Commerce', autre:'Autre' };
let type = 'all';

function esc(s){ const d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

document.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => {
  document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on'));
  c.classList.add('on'); type = c.dataset.type; load();
}));
document.getElementById('q').addEventListener('keydown', e => { if(e.key==='Enter') load(); });

async function load() {
  const grid = document.getElementById('grid');
  const count = document.getElementById('count');
  const q = document.getElementById('q').value.trim();
  count.textContent = 'Chargement...'; grid.innerHTML = '';
  const p = new URLSearchParams();
  if (type !== 'all') p.set('type', type);
  if (q) p.set('q', q);
  const { merchants } = await fetch('/api/public/merchants?' + p).then(r=>r.json());
  if (!merchants.length) { count.textContent = '0 commerce trouvé'; grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><span class="empty-icon">🔍</span>Aucun commerce trouvé.</div>'; return; }
  count.textContent = merchants.length + ' commerce(s)';
  grid.innerHTML = merchants.map(m => `
    <a href="/commerce.html?slug=${encodeURIComponent(m.slug)}" class="mcard">
      <div class="micon">${ICONS[m.business_type]||'📍'}</div>
      <div class="mname">${esc(m.business_name)}</div>
      <div class="mtype">${LABELS[m.business_type]||'Commerce'}${m.city?' · '+esc(m.city):''}</div>
      <div class="mdesc">${esc((m.description||'').slice(0,90))}</div>
      <div class="maddr">📍 ${esc(m.address||m.city||'Adresse non renseignée')}</div>
      ${m.offers_delivery ? '<span class="mdel">🚴 Livraison / À emporter disponible</span>' : ''}
    </a>`).join('');
}
load();
</script>
</body>
</html>
